<!DOCTYPE html>
<html>
<body style="background:black; text-align:center;">

<img id="randomImg" style="width:300px; margin-top:100px;">

<script>
const imagenes = [
  "images/img1.jpg",
  "images/img2.jpg",
  "images/img3.jpg"
];

const random = Math.floor(Math.random() * imagenes.length);
document.getElementById("randomImg").src = imagenes[random];
</script>

</body>
</html>
